name: Release

# Triggered by pushing a version tag (for example: git tag v1.0.0 && git push --tags)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    environment: release

    env:
      Solution_Name: RotationTracker.sln
      Wap_Project_Directory: RotationTracker.Package
      Wap_Project_Path: RotationTracker.Package\RotationTracker.Package.wapproj
      Installer_Project_Path: RotationTracker.Installer\RotationTracker.Installer.csproj
      Configuration: Release
      Platform: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Decode the PFX certificate used to sign the MSIX bundle.
      # See the README for how to generate one and store it as the
      # Base64_Encoded_Pfx + Pfx_Key secrets.
      - name: Decode signing certificate
        id: cert
        shell: pwsh
        run: |
          $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
          $pfxPath = Join-Path $env:GITHUB_WORKSPACE "signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          Add-Content -Path $env:GITHUB_OUTPUT -Value "pfx_path=$pfxPath"

      - name: Extract certificate thumbprint
        id: thumb
        shell: pwsh
        run: |
          $pfxPath = "${{ steps.cert.outputs.pfx_path }}"
          $password = ConvertTo-SecureString -String "${{ secrets.Pfx_Key }}" -AsPlainText -Force
          $cert = Get-PfxCertificate -FilePath $pfxPath -Password $password
          Add-Content -Path $env:GITHUB_OUTPUT -Value "thumbprint=$($cert.Thumbprint)"

          # Export the .cer alongside the MSIX for end-user trust installation.
          $cerPath = Join-Path $env:GITHUB_WORKSPACE "RotationTracker.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath -Type CERT -Force | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "cer_path=$cerPath"

      - name: Restore
        run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration /p:Platform=$env:Platform

      - name: Build and package
        run: |
          msbuild $env:Wap_Project_Path `
            /t:Build `
            /p:Configuration=$env:Configuration `
            /p:Platform=$env:Platform `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms=$env:Platform `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="${{ steps.cert.outputs.pfx_path }}" `
            /p:PackageCertificateThumbprint="${{ steps.thumb.outputs.thumbprint }}" `
            /p:PackageCertificatePassword="${{ secrets.Pfx_Key }}"

      - name: Publish native installer
        shell: pwsh
        run: |
          $installerOutput = Join-Path $env:GITHUB_WORKSPACE "native-installer"
          New-Item -ItemType Directory -Path $installerOutput -Force | Out-Null

          dotnet publish $env:Installer_Project_Path `
            -c $env:Configuration `
            -r win-x64 `
            --self-contained true `
            -p:Platform=$env:Platform `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o $installerOutput

          if ($LASTEXITCODE -ne 0) {
            throw "dotnet publish failed with exit code $LASTEXITCODE"
          }

          $sourceExe = Join-Path $installerOutput "RotationTracker.Installer.exe"
          Copy-Item -LiteralPath $sourceExe -Destination (Join-Path $installerOutput "install.exe") -Force
          Copy-Item -LiteralPath $sourceExe -Destination (Join-Path $installerOutput "uninstall.exe") -Force
          Remove-Item -LiteralPath $sourceExe -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath (Join-Path $installerOutput "RotationTracker.Installer.pdb") -Force -ErrorAction SilentlyContinue

      - name: Stage release assets
        id: stage
        shell: pwsh
        run: |
          $stage = Join-Path $env:GITHUB_WORKSPACE "release-assets"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          $appPackages = Join-Path $env:Wap_Project_Directory "AppPackages"
          $bundle = Get-ChildItem -Path $appPackages -Filter "*.msixbundle" -Recurse |
                    Sort-Object LastWriteTime -Descending |
                    Select-Object -First 1
          if (-not $bundle) { throw "No msixbundle produced." }

          $bundleDir = $bundle.Directory.FullName

          # Copy bundle under a stable name so install.exe can always resolve it.
          Copy-Item -Path $bundle.FullName `
                    -Destination (Join-Path $stage "RotationTracker.msixbundle") `
                    -Force

          Copy-Item -Path "${{ steps.thumb.outputs.cer_path }}" -Destination $stage -Force

          # Copy x64 framework dependencies that install.exe needs.
          $depsDir = Join-Path $bundleDir "Dependencies\x64"
          if (Test-Path $depsDir) {
            Get-ChildItem -Path $depsDir -File | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $stage -Force
            }
          }

          $installerOutput = Join-Path $env:GITHUB_WORKSPACE "native-installer"
          Copy-Item -Path (Join-Path $installerOutput "install.exe") -Destination $stage -Force
          Copy-Item -Path (Join-Path $installerOutput "uninstall.exe") -Destination $stage -Force

          $backendStage = Join-Path $stage "ElevatedBackend"
          New-Item -ItemType Directory -Path $backendStage -Force | Out-Null
          $backendOutput = Join-Path $env:GITHUB_WORKSPACE "RotationTracker.Backend\bin\x64\Release"
          Get-ChildItem -Path $backendOutput -File | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $backendStage -Force
          }

          $zipPath = Join-Path $env:GITHUB_WORKSPACE "RotationTracker-${{ github.ref_name }}-installer.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Path $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $zipPath

          Get-ChildItem -Path $stage
          Add-Content -Path $env:GITHUB_OUTPUT -Value "stage=$stage"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_path=$zipPath"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.stage.outputs.zip_path }}
